# A-Cal — Self-hosted deployment via Docker Compose
#
# Usage:
#   docker compose up --build              # SQLite (default, zero config)
#   docker compose --profile postgres up   # PostgreSQL backend
#
# Then open http://localhost:3456
#
# Data is persisted in volumes (SQLite DB or PostgreSQL).
# OAuth client credentials and LLM API keys go in .env (see .env.example).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - a-cal-data:/root/.a-cal
    environment:
      - A_CAL_PLUGIN_DIR=/root/.a-cal/plugins
      - A_CAL_CORS_ORIGINS=http://localhost:3456,http://localhost:3000
      # PostgreSQL connection (when using --profile postgres)
      - DATABASE_URL=${DATABASE_URL:-}
      # OAuth credentials (optional — needed for real Google/Outlook sync)
      # - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      # - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # - OUTLOOK_CLIENT_ID=${OUTLOOK_CLIENT_ID:-}
      # - OUTLOOK_CLIENT_SECRET=${OUTLOOK_CLIENT_SECRET:-}
      # LLM provider keys (optional — needed for cloud model routing)
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3456:3456"
    environment:
      - A_CAL_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # PostgreSQL service — activate with: docker compose --profile postgres up
  # Requires psycopg2-binary: pip install a-cal[postgres]
  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acal
      POSTGRES_USER: acal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acal-dev}
    volumes:
      - a-cal-postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acal"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  a-cal-data:
  a-cal-postgres:
