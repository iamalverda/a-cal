# A-Cal -- Alembic migration configuration
#
# Usage:
#   alembic upgrade head     # apply all migrations
#   alembic downgrade -1     # roll back one migration
#   alembic revision -m "description"  # create a new migration
#
# When running alongside atom, add A-Cal's version_locations to atom's
# alembic.ini and merge heads.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Default to SQLite. Override with DATABASE_URL for PostgreSQL.
# The env.py script reads DATABASE_URL from the environment.
sqlalchemy.url = sqlite:///~/.a-cal/a-cal.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
